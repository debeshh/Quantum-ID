<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum ID</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Inter', sans-serif;
}

body{
  background:#0f0f0f;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:80px 20px;
}

.wrapper{
  width:100%;
  max-width:380px;
}

h1{
  text-align:center;
  margin-bottom:30px;
  letter-spacing:2px;
  font-weight:600;
}

/* Search */
input{
  width:100%;
  padding:16px;
  border-radius:18px;
  border:1px solid #2a2a2a;
  background:#161616;
  color:white;
  font-size:16px;
}

input:focus{
  outline:none;
  border-color:#3b82f6;
}

/* Suggestions */
.suggestions{
  margin-top:10px;
  background:#161616;
  border-radius:16px;
  border:1px solid #2a2a2a;
  display:none;
  max-height:200px;
  overflow-y:auto;
}

.suggestions div{
  padding:12px 16px;
  cursor:pointer;
  border-bottom:1px solid #222;
}

.suggestions div:hover{
  background:#1f1f1f;
}

/* History */
.history-section{
  margin-top:15px;
  display:none;
}

.history-title{
  font-size:12px;
  color:#888;
  margin-bottom:8px;
}

.history-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.history-chip{
  background:#1f1f1f;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
  transition:0.3s;
}

.history-chip:hover{
  background:#2a2a2a;
}

/* Card */
.profile-card{
  margin-top:40px;
  background:#141414;
  border-radius:28px;
  padding:40px 30px;
  display:none;
  text-align:center;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* Profile Icon */
.profile-icon{
  width:120px;
  height:120px;
  margin:0 auto 20px;
}

.profile-icon svg{
  width:100%;
  height:100%;
  fill:white;
  opacity:0.85;
}

/* Name */
#studentName{
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}

/* Description */
#tagline{
  font-size:14px;
  color:#bbb;
  line-height:1.6;
  margin-bottom:25px;
}

/* Icon Links */
.icon-links{
  display:flex;
  justify-content:center;
  gap:25px;
}

.icon-links a{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#1f1f1f;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
}

.icon-links a:hover{
  transform:translateY(-4px);
  background:#2a2a2a;
}

.icon-links img{
  width:22px;
}
</style>
</head>

<body>

<div class="wrapper">
  <h1>Quantum ID</h1>

  <input type="text" id="nameInput" placeholder="Search name..." oninput="searchByName()">
  <div class="suggestions" id="suggestions"></div>

  <!-- History Section -->
  <div class="history-section" id="historySection">
    <div class="history-title">Recent Searches</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="profile-card" id="profileCard">

    <div class="profile-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 
        2.3-5 5 2.3 5 5 5zm0 2c-3.3 
        0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
      </svg>
    </div>

    <div id="studentName"></div>
    <div id="tagline"></div>

    <div class="icon-links">
      <a id="callBtn">
        <img src="https://img.icons8.com/hands/100/phone.png">
      </a>

      <a id="whatsappBtn">
        <img src="https://img.icons8.com/color/48/whatsapp--v1.png">
      </a>

      <a id="mailBtn">
        <img src="https://img.icons8.com/fluency/48/gmail-new.png">
      </a>
    </div>

  </div>
</div>

<script>

let studentsData = [];

fetch("students.json")
  .then(res => res.json())
  .then(data => studentsData = data);

function normalize(str){
  return str.toLowerCase().replace(/[^a-z0-9]/g, "");
}

function getYearFromSIC(sic){
  const yearPrefix = sic.substring(0,2);
  if(yearPrefix === "22") return "Fourth-year";
  if(yearPrefix === "23") return "Third-year";
  if(yearPrefix === "24") return "Second-year";
  return "";
}

/* Save Search */
function saveSearch(student){
  let history = JSON.parse(localStorage.getItem("searchHistory")) || [];

  history = history.filter(item => item.sic !== student.sic);
  history.unshift(student);
  history = history.slice(0,5);

  localStorage.setItem("searchHistory", JSON.stringify(history));
  renderHistory();
}

/* Render History */
function renderHistory(){
  const history = JSON.parse(localStorage.getItem("searchHistory")) || [];
  const historySection = document.getElementById("historySection");
  const historyList = document.getElementById("historyList");

  historyList.innerHTML = "";

  if(history.length === 0){
    historySection.style.display = "none";
    return;
  }

  historySection.style.display = "block";

  history.forEach(student => {
    const chip = document.createElement("div");
    chip.className = "history-chip";
    chip.innerText = student.name;
    chip.onclick = () => showStudent(student);
    historyList.appendChild(chip);
  });
}

function showStudent(student){

  document.getElementById("studentName").innerText = student.name;

  const yearText = getYearFromSIC(student.sic);

  document.getElementById("tagline").innerText =
    `${yearText} ${student.branch} student at Silicon University.`;

  document.getElementById("callBtn").href = `tel:${student.mobile}`;
  document.getElementById("whatsappBtn").href = `https://wa.me/${student.mobile}`;
  document.getElementById("mailBtn").href = `mailto:${student.student_mail}`;

  document.getElementById("profileCard").style.display = "block";

  saveSearch(student);
}

function searchByName(){
  const input = normalize(document.getElementById("nameInput").value);
  const suggestionBox = document.getElementById("suggestions");

  suggestionBox.innerHTML = "";
  document.getElementById("profileCard").style.display = "none";

  if(input === ""){
    suggestionBox.style.display = "none";
    return;
  }

  const matches = studentsData
    .filter(student => normalize(student.name).includes(input))
    .slice(0,8);

  suggestionBox.style.display = matches.length ? "block" : "none";

  matches.forEach(student => {
    const div = document.createElement("div");
    div.innerText = student.name;
    div.onclick = () => {
      showStudent(student);
      suggestionBox.style.display = "none";
      document.getElementById("nameInput").value = "";
    };
    suggestionBox.appendChild(div);
  });
}

/* Load history on startup */
renderHistory();

</script>

</body>
</html>
