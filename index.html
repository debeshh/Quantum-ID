<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Inter', sans-serif;
}

body{
  background:#0f0f0f;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:80px 20px;
}

.wrapper{
  width:100%;
  max-width:380px;
}

h1{
  text-align:center;
  margin-bottom:10px;
  letter-spacing:2px;
  font-weight:600;
}

.page-subtitle{
  text-align:center;
  color:#a0a0a0;
  font-size:13px;
  line-height:1.6;
  margin-bottom:22px;
}

.sr-only{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0, 0, 0, 0);
  border:0;
}

/* Search */
input{
  width:100%;
  padding:16px;
  border-radius:18px;
  border:1px solid #2a2a2a;
  background:#161616;
  color:white;
  font-size:16px;
}

input:focus{
  outline:none;
  border-color:#3b82f6;
}

/* Suggestions */
.suggestions{
  margin-top:10px;
  background:#161616;
  border-radius:16px;
  border:1px solid #2a2a2a;
  display:none;
  max-height:200px;
  overflow-y:auto;
}

.suggestions div{
  padding:12px 16px;
  cursor:pointer;
  border-bottom:1px solid #222;
}

.suggestions div:hover{
  background:#1f1f1f;
}

/* History */
.history-section{
  margin-top:15px;
  display:none;
}

.history-title{
  font-size:12px;
  color:#888;
  margin-bottom:8px;
}

.history-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:8px;
}

.clear-history-btn{
  background:transparent;
  border:none;
  color:#888;
  font-size:12px;
  cursor:pointer;
  padding:2px 4px;
}

.clear-history-btn:hover{
  color:#bbb;
}

.history-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.history-chip{
  background:#1f1f1f;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
  transition:0.3s;
  display:inline-flex;
  align-items:center;
  gap:8px;
}

.history-chip:hover{
  background:#2a2a2a;
}

.chip-close{
  border:none;
  background:transparent;
  color:#aaa;
  font-size:14px;
  line-height:1;
  cursor:pointer;
  padding:0;
}

.chip-close:hover{
  color:#fff;
}

/* Card */
.profile-card{
  margin-top:40px;
  background:#141414;
  border-radius:28px;
  padding:40px 30px;
  display:none;
  text-align:center;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* Profile Icon */
.profile-icon{
  width:120px;
  height:120px;
  margin:0 auto 20px;
}

.profile-icon svg{
  width:100%;
  height:100%;
  fill:white;
  opacity:0.85;
}

/* Name */
#studentName{
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}

/* Description */
#tagline{
  font-size:14px;
  color:#bbb;
  line-height:1.6;
  margin-bottom:25px;
}

/* Icon Links */
.icon-links{
  display:flex;
  justify-content:center;
  gap:25px;
}

.icon-links a{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#1f1f1f;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
}

.icon-links a:hover{
  transform:translateY(-4px);
  background:#2a2a2a;
}

.icon-links img{
  width:22px;
}
</style>
</head>

<body>

<div class="wrapper">
  <h1>Quantum ID</h1>
  <p class="page-subtitle">Silicon University student directory for quick ID, name, and contact lookup.</p>

  <p class="sr-only">Search Silicon University students by name, SIC ID, mobile number, student email, and branch.</p>
  <input type="text" id="nameInput" placeholder="Search by name, SIC, phone or email..." oninput="searchByName()" aria-label="Search Silicon University students by name, SIC, phone, or email">
  <div class="suggestions" id="suggestions"></div>

  <!-- History Section -->
  <div class="history-section" id="historySection">
    <div class="history-header">
      <div class="history-title">Recent Searches</div>
      <button class="clear-history-btn" id="clearHistoryBtn" onclick="clearHistory()">Clear all</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="profile-card" id="profileCard">

    <div class="profile-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 
        2.3-5 5 2.3 5 5 5zm0 2c-3.3 
        0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
      </svg>
    </div>

    <div id="studentName"></div>
    <div id="tagline"></div>

    <div class="icon-links">
      <a id="callBtn">
        <img src="https://img.icons8.com/hands/100/phone.png" alt="Call student">
      </a>

      <a id="whatsappBtn">
        <img src="https://img.icons8.com/color/48/whatsapp--v1.png" alt="WhatsApp student">
      </a>

      <a id="mailBtn">
        <img src="https://img.icons8.com/fluency/48/gmail-new.png" alt="Email student">
      </a>
    </div>

  </div>
</div>

<script>

let studentsData = [];

fetch("students.json")
  .then(res => res.json())
  .then(data => studentsData = data);

function normalize(str){
  return str.toLowerCase().replace(/[^a-z0-9]/g, "");
}

function getYearFromSIC(sic){
  const yearPrefix = sic.substring(0,2);
  if(yearPrefix === "22") return "Fourth-year";
  if(yearPrefix === "23") return "Third-year";
  if(yearPrefix === "24") return "Second-year";
  return "";
}

/* Save Search */
function saveSearch(student){
  let history = JSON.parse(localStorage.getItem("searchHistory")) || [];

  history = history.filter(item => item.sic !== student.sic);
  history.unshift(student);
  history = history.slice(0,5);

  localStorage.setItem("searchHistory", JSON.stringify(history));
  renderHistory();
}

/* Render History */
function renderHistory(){
  const history = JSON.parse(localStorage.getItem("searchHistory")) || [];
  const historySection = document.getElementById("historySection");
  const historyList = document.getElementById("historyList");
  const clearHistoryBtn = document.getElementById("clearHistoryBtn");

  historyList.innerHTML = "";

  if(history.length === 0){
    historySection.style.display = "none";
    return;
  }

  historySection.style.display = "block";
  clearHistoryBtn.style.display = "inline-block";

  history.forEach(student => {
    const chip = document.createElement("div");
    chip.className = "history-chip";
    chip.onclick = () => showStudent(student);

    const chipText = document.createElement("span");
    chipText.innerText = student.name;

    const closeBtn = document.createElement("button");
    closeBtn.className = "chip-close";
    closeBtn.innerText = "×";
    closeBtn.onclick = (event) => {
      event.stopPropagation();
      removeHistoryItem(student.sic);
    };

    chip.appendChild(chipText);
    chip.appendChild(closeBtn);
    historyList.appendChild(chip);
  });
}

function removeHistoryItem(sic){
  let history = JSON.parse(localStorage.getItem("searchHistory")) || [];
  history = history.filter(student => student.sic !== sic);
  localStorage.setItem("searchHistory", JSON.stringify(history));
  renderHistory();
}

function clearHistory(){
  localStorage.removeItem("searchHistory");
  renderHistory();
}

function showStudent(student){

  document.getElementById("studentName").innerText = student.name;

  const yearText = getYearFromSIC(student.sic);

  document.getElementById("tagline").innerText =
    `${yearText} ${student.branch} student at Silicon University.`;

  document.getElementById("callBtn").href = `tel:${student.mobile}`;
  document.getElementById("whatsappBtn").href = `https://wa.me/${student.mobile}`;
  document.getElementById("mailBtn").href = `mailto:${student.student_mail}`;

  document.getElementById("profileCard").style.display = "block";

  saveSearch(student);
}

function searchByName(){
  const input = normalize(document.getElementById("nameInput").value);
  const suggestionBox = document.getElementById("suggestions");

  suggestionBox.innerHTML = "";
  document.getElementById("profileCard").style.display = "none";

  if(input === ""){
    suggestionBox.style.display = "none";
    return;
  }

  const matches = studentsData
    .filter(student => {
      const searchableFields = [
        student.name,
        student.sic,
        student.mobile,
        student.student_mail,
        student.branch
      ];

      return searchableFields.some(field =>
        normalize(String(field || "")).includes(input)
      );
    })
    .slice(0,8);

  suggestionBox.style.display = matches.length ? "block" : "none";

  matches.forEach(student => {
    const div = document.createElement("div");
    div.innerText = student.name;
    div.onclick = () => {
      showStudent(student);
      suggestionBox.style.display = "none";
      document.getElementById("nameInput").value = "";
    };
    suggestionBox.appendChild(div);
  });
}

/* Load history on startup */
renderHistory();

</script>

</body>
</html>
